apiVersion: v1
kind: Service
metadata:
  name: inventory-app-service
  namespace: default
  labels:
    app: inventory-app
    version: v1.0
spec:
  # ── LoadBalancer: expose externally (cloud) ──────────────────
  # Use NodePort for Minikube/K3s (change type below if needed)
  type: LoadBalancer

  selector:
    app: inventory-app   # Must match Deployment pod labels

  ports:
    - name: http
      protocol: TCP
      port: 80            # External port
      targetPort: 3000    # Container port

  # ── Session affinity (optional) ──────────────────────────────
  sessionAffinity: None

---
