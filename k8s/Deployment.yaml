apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
  namespace: default
  labels:
    app: inventory-app
    version: v1.0
    managed-by: kubectl
spec:
  # ── High Availability: 3 replicas ──────────────────────────
  replicas: 3

  selector:
    matchLabels:
      app: inventory-app

  # ── Rolling Update Strategy ─────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # Allow 1 extra pod during update
      maxUnavailable: 0    # Zero-downtime: never kill a pod before new one is ready

  template:
    metadata:
      labels:
        app: inventory-app
        version: v1.0
    spec:
      # ── Pod-level security context ───────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

      containers:
        - name: inventory-app
          # ⚠️  Replace weuth with your Docker Hub username
          image: weuth/inventory-app:v1.0
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # ── Environment variables ──────────────────────────────
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # ── Resource limits ────────────────────────────────────
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"

          # ── Liveness probe: restart if app is stuck ────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # ── Readiness probe: only route traffic when ready ─────
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # ── Container-level security context ──────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      # ── Pod scheduling: spread across nodes ──────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: inventory-app
